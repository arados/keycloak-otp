name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn clean verify -B

      - name: Upload single JAR
        uses: actions/upload-artifact@v7
        with:
          name: keycloak-otp
          path: dist/target/keycloak-otp-*.jar
          if-no-files-found: error

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Run Playwright E2E suite
        run: mvn verify -P e2e -DskipTests -B

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore

      - name: Dump Keycloak logs on failure
        if: failure()
        run: docker compose logs keycloak || true

  spotbugs:
    # Static analysis: fast, deterministic, runs on every push so security regressions
    # block at PR time instead of slipping in unnoticed and only being caught at release.
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: SpotBugs + Find Security Bugs
        run: mvn compile spotbugs:check -B

  dependency-check:
    # NVD-backed CVE scan. Slow (~10+ min) and depends on an external feed, so it
    # runs only on main and tag pushes — PRs get the fast spotbugs signal. The
    # build fails on any finding with CVSS >= 9 (critical); lower-severity findings
    # are still reported via the uploaded HTML report but do not block.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn dependency-check:aggregate -DnvdApiKey="$NVD_API_KEY" -DfailBuildOnCVSS=9 -B

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build, e2e, spotbugs, dependency-check]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Derive release version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set project version
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.value }} -DgenerateBackupPoms=false -B

      - name: Build release JAR
        run: mvn clean package -DskipTests -B

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/target/keycloak-otp-*.jar
          generate_release_notes: true
