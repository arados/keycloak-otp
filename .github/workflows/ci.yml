name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn clean verify -B

      - name: Upload single JAR
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-otp
          path: dist/target/keycloak-otp-*.jar
          if-no-files-found: error

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Run Playwright E2E suite
        run: mvn verify -P e2e -DskipTests -B

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore

      - name: Dump Keycloak logs on failure
        if: failure()
        run: docker compose logs keycloak || true

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: SpotBugs + Find Security Bugs
        run: mvn compile spotbugs:check -B

      - name: OWASP Dependency-Check
        run: mvn dependency-check:aggregate -B
        continue-on-error: true

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build, e2e, security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Derive release version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set project version
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.value }} -DgenerateBackupPoms=false -B

      - name: Build release JAR
        run: mvn clean package -DskipTests -B

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/target/keycloak-otp-*.jar
          generate_release_notes: true
