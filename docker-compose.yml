services:
  keycloak:
    build: .
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_SPI_THEME__FOLDER__ENABLED: "false"
      # Dev-only: opt the default LogSmsSenderFactory into logging raw OTP codes so the
      # E2E suite can extract them from `docker compose logs`. Never enable in production.
      KEYCLOAK_OTP_LOG_SMS_UNSAFE: "true"
    ports:
      - "8080:8080"
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"