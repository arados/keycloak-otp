# ============================================================================
# DEMO / DEVELOPMENT ONLY — DO NOT USE AS-IS IN PRODUCTION.
#
# This stack intentionally trades security for ease of local use:
#   - `start-dev` runs Keycloak with the dev profile (HTTP enabled, hostname-strict
#     disabled, in-memory H2 by default).
#   - Bootstrap admin credentials are `admin` / `admin`.
#   - The `otp-demo` realm pre-creates a test user `testuser` / `password`.
#   - `KEYCLOAK_OTP_LOG_SMS_UNSAFE=true` writes raw OTP codes to the server log
#     so the e2e suite can pick them up via `docker compose logs`.
#
# For production, deploy the shaded JAR (`dist/target/keycloak-otp-*.jar`) into a
# properly hardened Keycloak instance: production profile, TLS-terminated reverse
# proxy, strong admin credentials, durable database, and a real `SmsProvider`
# implementation. The realm-export.json in this repo is reference structure only,
# not a deployable artifact.
# ============================================================================

services:
  keycloak:
    build: .
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_SPI_THEME__FOLDER__ENABLED: "false"
      # Dev-only: opt the default LogSmsSenderFactory into logging raw OTP codes so the
      # E2E suite can extract them from `docker compose logs`. Never enable in production.
      KEYCLOAK_OTP_LOG_SMS_UNSAFE: "true"
    ports:
      - "8080:8080"
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"